<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>阿拉伯语常用语1000句 · 发音版</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Naskh+Arabic:wght@400;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="wrap">

    <!-- 页眉 -->
    <header class="site">
      <div class="ar-orn">﷽ &nbsp; بِسْمِ ٱللَّٰهِ</div>
      <h1 id="page-title">阿拉伯语常用语1000句</h1>
      <div class="sub">أَلْفُ جُمْلَةٍ عَرَبِيَّةٍ شَائِعَةٍ · 点按任意阿拉伯文即可聆听</div>
      <div class="legend" id="legend"></div>
    </header>

    <div class="divider"><span class="diamond"></span></div>

    <!-- 主体 -->
    <div class="layout">

      <!-- 侧边栏：使用说明 + 目录 -->
      <aside class="sidebar">
        <div class="intro" id="intro"></div>
        <nav class="toc">
          <h3>目录 · فهرس</h3>
          <div id="toc-list"></div>
          <div class="search-box" style="margin-top:14px;">
            <input id="search" type="text" placeholder="搜索中文 / 阿拉伯文 / 拼音…" />
            <button id="search-clear" class="search-clear" title="清除搜索">✕</button>
          </div>
        </nav>
      </aside>

      <!-- 内容 -->
      <main>
        <div id="sections"></div>
        <p id="empty" style="display:none;color:var(--ink-dim);text-align:center;padding:40px;">未找到匹配的句子。</p>
      </main>
    </div>
  </div>

  <!-- 正在播放 底栏 -->
  <div class="now-playing" id="now-playing">
    <div class="np-icon">♪</div>
    <div class="np-text">
      <div class="np-label" id="np-label">正在播放</div>
      <div class="np-ar" id="np-ar"></div>
    </div>
    <div class="np-bar"><i id="np-fill"></i></div>
  </div>

  <!-- 国旗 emoji 跨平台显示：Windows 默认不渲染国旗，用 Twemoji 转成图片 -->
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/twemoji.min.js"></script>
  <!-- 数据（由脚本生成） -->
  <script defer src="js/data.js"></script>
  <script defer src="js/audio.js"></script>
  <script defer src="js/app.js"></script>
</body>
</html>
